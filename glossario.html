<!DOCTYPE html>
<html lang="it" class="dark">
<head>
  <!-- Enterprise Security Headers -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://img.youtube.com https://i.ytimg.com; frame-src 'self' https://www.youtube-nocookie.com https://www.youtube.com;">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="referrer" content="no-referrer">
  <!-- Core Anti-Tampering Engine -->
  <script src="js/security-core.js"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Glossario della cartomagia — termini spiegati come su Wikipedia." />
  <title>Glossario — OpenMagic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb' },
            accent: { 400: '#a78bfa', 500: '#8b5cf6' }
          },
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            display: ['"Space Grotesk"', 'sans-serif'],
          }
        }
      }
    };
  </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            serif: ['Cinzel', 'serif'],
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          }
        }
      }
    };
  </script>
</head>
<body class="bg-[#050505] text-slate-100 min-h-screen antialiased font-sans">
  <header id="site-header" class="border-b border-zinc-800/80 bg-[#050505]/90 backdrop-blur sticky top-0 z-50"></header>
  <main class="max-w-3xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-bold font-display">Glossario</h1>
    <p class="text-zinc-400 mt-2">I termini della cartomagia, spiegati in italiano chiaro.</p>
    <input id="glossary-search" type="search" maxlength="80" placeholder="Cerca un termine…"
      class="mt-6 w-full px-4 py-2 rounded-lg bg-zinc-900 border border-zinc-700 text-sm focus:outline-none focus:border-blue-500/60" />
    <div id="glossary-list" class="mt-8 space-y-4">Caricamento…</div>
  </main>
  <footer id="site-footer" class="border-t border-zinc-800 mt-12"></footer>
  <script type="module" src="js/glossario.js"></script>
  <script type="module" src="js/interactions.js"></script>
</body>
</html>
