<!DOCTYPE html>
<html lang="it" class="dark">
<head>
  <!-- Enterprise Security Headers -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://img.youtube.com https://i.ytimg.com; frame-src 'self' https://www.youtube-nocookie.com https://www.youtube.com;">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="no-referrer">
  <!-- Core Anti-Tampering Engine -->
  <script src="js/security-core.js"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Enciclopedia OpenMagic — tutte le tecniche, trucchi e figure cardistry." data-i18n-title="meta.description.browse" />
  <title>Enciclopedia — OpenMagic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb' },
            accent: { 400: '#a78bfa', 500: '#8b5cf6' }
          },
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            display: ['"Space Grotesk"', 'sans-serif'],
          }
        }
      }
    };
  </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            serif: ['Cinzel', 'serif'],
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          }
        }
      }
    };
  </script>
</head>
<body class="bg-[#050505] text-slate-100 min-h-screen antialiased font-sans">
  <header id="site-header" class="border-b border-zinc-800/80 bg-[#050505]/90 backdrop-blur sticky top-0 z-50"></header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold font-display" data-i18n="browse.title">Enciclopedia</h1>
    <p class="text-zinc-500 text-sm mt-1"><span id="result-count">…</span> · <span id="progress-text">…</span></p>

    <input id="search" type="search" maxlength="80" placeholder="Filtra in tempo reale…" data-i18n-placeholder="browse.search"
      class="mt-4 w-full max-w-lg px-4 py-2 rounded-lg bg-zinc-900 border border-zinc-700 text-sm focus:outline-none focus:border-blue-500/60" />

    <div class="flex flex-wrap gap-6 mt-6 mb-8 p-4 rounded-xl bg-zinc-900/50 border border-zinc-800">
      <fieldset class="space-y-2">
        <legend class="text-xs text-zinc-500 uppercase" data-i18n="browse.filters">Categoria</legend>
        <div class="flex flex-wrap gap-2">
          <label class="cursor-pointer"><input type="radio" name="categoria" value="" class="sr-only peer" checked />
            <span data-i18n="browse.filter.all" class="peer-checked:bg-blue-600 peer-checked:text-zinc-950 px-3 py-1 rounded-full text-sm border border-zinc-700 block">Tutte</span></label>
          <label class="cursor-pointer"><input type="radio" name="categoria" value="tecnica" class="sr-only peer" />
            <span data-i18n="browse.filter.technique" class="peer-checked:bg-violet-600 peer-checked:text-white px-3 py-1 rounded-full text-sm border border-zinc-700 block">Tecniche</span></label>
          <label class="cursor-pointer"><input type="radio" name="categoria" value="trucco" class="sr-only peer" />
            <span data-i18n="browse.filter.trick" class="peer-checked:bg-amber-600 peer-checked:text-zinc-950 px-3 py-1 rounded-full text-sm border border-zinc-700 block">Trucchi</span></label>
          <label class="cursor-pointer"><input type="radio" name="categoria" value="cardistry" class="sr-only peer" />
            <span data-i18n="browse.filter.cardistry" class="peer-checked:bg-cyan-600 peer-checked:text-zinc-950 px-3 py-1 rounded-full text-sm border border-zinc-700 block">Cardistry</span></label>
        </div>
      </fieldset>
      <fieldset class="space-y-2">
        <legend class="text-xs text-zinc-500 uppercase" data-i18n="browse.level.title">Livello</legend>
        <div class="flex flex-wrap gap-2">
          <label class="cursor-pointer"><input type="radio" name="livello" value="" class="sr-only peer" checked />
            <span data-i18n="browse.level.all" class="peer-checked:bg-zinc-100 peer-checked:text-zinc-900 px-3 py-1 rounded-full text-sm border border-zinc-700 block">Tutti</span></label>
          <label class="cursor-pointer"><input type="radio" name="livello" value="1" class="sr-only peer" />
            <span data-i18n="browse.level.1" class="peer-checked:bg-zinc-100 peer-checked:text-zinc-900 px-3 py-1 rounded-full text-sm border border-zinc-700 block">Liv. 1</span></label>
          <label class="cursor-pointer"><input type="radio" name="livello" value="2" class="sr-only peer" />
            <span data-i18n="browse.level.2" class="peer-checked:bg-zinc-100 peer-checked:text-zinc-900 px-3 py-1 rounded-full text-sm border border-zinc-700 block">Liv. 2</span></label>
          <label class="cursor-pointer"><input type="radio" name="livello" value="3" class="sr-only peer" />
            <span data-i18n="browse.level.3" class="peer-checked:bg-zinc-100 peer-checked:text-zinc-900 px-3 py-1 rounded-full text-sm border border-zinc-700 block">Liv. 3</span></label>
        </div>
      </fieldset>
    </div>

    <div id="results-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    <button id="load-more" type="button" class="hidden mt-8 mx-auto block px-6 py-2 rounded-lg border border-zinc-600 text-sm hover:border-blue-500/50">
      Carica altre voci
    </button>
  </main>

  <footer id="site-footer" class="border-t border-zinc-800 mt-12"></footer>
  <script type="module" src="js/browse.js"></script>
  <script type="module" src="js/interactions.js"></script>
</body>
</html>
